<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chegamos Maringa - Sushi e Poke</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: 'Arial', sans-serif;
            background: #1a1a1a;
            height: 100%;
            width: 100%;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .image-container {
            width: 100%;
            background-image: url('bg-landing.jpg.jpeg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center top;
            aspect-ratio: 9 / 16;
            border-radius: 20px;
            position: relative;
            overflow: visible;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .button-wrapper {
            position: absolute;
            top: 36.5%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 75%;
            z-index: 10;
        }

        .ifood-button {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #ea1d2c 0%, #d41a23 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(234, 29, 44, 0.4);
            font-family: 'Arial', sans-serif;
        }

        .ifood-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(234, 29, 44, 0.6);
        }

        .ifood-button:active {
            transform: translateY(0);
        }

        @media (max-width: 480px) {
            .ifood-button {
                font-size: 14px;
                padding: 12px 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-wrapper">
            <div class="image-container">
                <div class="button-wrapper">
                    <a href="https://www.ifood.com.br/delivery/maringa-pr/sushi--poke-mazegohan-zona-03/7e70a00a-be4c-4142-9d35-ed2bb6ade202?UTM_Medium=share" class="ifood-button" target="_blank" rel="noopener noreferrer">
                        🛵 Peça Agora
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
